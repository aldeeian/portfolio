  <title>MD Saif Aldeen — Portfolio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --accent: #6c63ff;
      --accent2: #00d4ff;
      --accent3: #ff6b9d;
      --text: #e8e8f0;
      --muted: #888899;
      --border: rgba(108, 99, 255, 0.2);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
